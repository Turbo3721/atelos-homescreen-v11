<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelos — Homescreen V10</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root {
  --bg: #0c0d12;
  --bg-side: #101118;
  --bg-card: #17181f;
  --bg-card2: #1c1d26;
  --bg-hover: #1f2029;
  --bg-input: #14151c;
  --border: #1c1d28;
  --border-lt: #252636;
  --text: #f0eee8;
  --text2: #b5b2be;
  --text3: #7a778a;
  --text4: #4e4b5e;
  --accent: #9b8afb;
  --accent-h: #b5a8fc;
  --accent-d: rgba(155,138,251,.07);
  --accent-b: rgba(155,138,251,.18);
  --green: #6dd4a1;
  --green-d: rgba(109,212,161,.07);
  --amber: #e8b44c;
  --amber-d: rgba(232,180,76,.07);
  --blue: #7eb8f0;
  --sidebar-width: 280px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh}

/* ── Top Bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.sidebar-toggle{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text3);cursor:pointer;transition:all .15s;border:none;background:transparent;flex-shrink:0}
.sidebar-toggle:hover{background:var(--bg-hover);color:var(--text2)}
.sidebar-toggle.sidebar-hidden{background:var(--accent-d);color:var(--accent);border:1px solid var(--accent-b)}
.logo{width:30px;height:30px;background:linear-gradient(135deg,#a594fd,#7b68ee);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;box-shadow:0 2px 12px rgba(155,138,251,.2)}
.brand{font-size:16px;font-weight:700;color:var(--text);letter-spacing:.1px}
.tabs{display:flex;align-items:center;gap:4px;margin-left:20px}
.tab{padding:7px 18px;border-radius:10px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .2s;white-space:nowrap;border:1px solid transparent}
.tab:hover{color:var(--text2);background:var(--bg-hover)}
.tab.active{background:var(--accent-d);color:var(--accent);border-color:var(--accent-b);font-weight:600}
.tab-div{width:1px;height:18px;background:var(--border-lt);margin:0 6px}
.tab-add{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--text4);cursor:pointer;border:1px dashed var(--border-lt);font-size:18px;transition:all .2s}
.tab-add:hover{color:var(--accent);border-color:var(--accent-b);background:var(--accent-d)}
.topbar-right{display:flex;align-items:center;gap:14px}
.trial{font-size:11px;color:var(--text3)}
.trial b{color:var(--amber)}
.badge{font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-d);border:1px solid var(--accent-b);padding:3px 12px;border-radius:20px}
.qc-btn{display:flex;align-items:center;gap:7px;padding:8px 18px;background:var(--bg-card);border:1px solid var(--border-lt);border-radius:10px;color:var(--text2);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .2s}
.qc-btn:hover{border-color:var(--accent-b);color:var(--accent);background:var(--accent-d)}
.qc-btn .hk{font-size:9px;color:var(--text4);background:var(--bg);padding:2px 6px;border-radius:4px;font-family:'SF Mono',monospace;border:1px solid var(--border)}
.bell{position:relative;color:var(--text4);cursor:pointer;display:flex;align-items:center;transition:color .15s}
.bell:hover{color:var(--text2)}
.bell-dot{position:absolute;top:-2px;right:-2px;width:7px;height:7px;background:var(--accent);border-radius:50%;border:2px solid var(--bg)}

/* ── Main ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{flex:0 0 var(--sidebar-width);background:var(--bg-side);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:relative;transition:flex-basis .25s ease,opacity .2s ease,border-color .25s ease}
.sidebar.collapsed{flex-basis:0;opacity:0;border-right-color:transparent}
.side-resize-handle{position:absolute;top:0;right:-3px;width:6px;height:100%;cursor:col-resize;z-index:20;background:transparent;transition:background .15s}
.side-resize-handle:hover,.side-resize-handle.dragging{background:var(--accent-b)}
.side-top{padding:20px 22px 0}
.side-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ctx-name{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.ctx-desc{font-size:12px;color:var(--text3);margin-top:4px}
.new-conv-top-btn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;border:1px solid var(--border-lt);background:transparent;color:var(--text4);cursor:pointer;transition:all .15s;flex-shrink:0;margin-top:2px}
.new-conv-top-btn:hover{background:var(--accent-d);border-color:var(--accent-b);color:var(--accent)}

/* Sidebar tabs */
.side-tabs{display:flex;gap:2px;padding:14px 22px 0}
.side-tab{flex:1;padding:8px 0;text-align:center;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-radius:8px;transition:all .15s;border:none;background:transparent}
.side-tab:hover{color:var(--text2);background:var(--bg-hover)}
.side-tab.active{color:var(--accent);background:var(--accent-d);font-weight:600}
.side-tab-badge{font-size:10px;font-weight:600;margin-left:4px;padding:1px 6px;border-radius:8px;vertical-align:1px}
.side-tab-badge.accent{color:var(--accent);background:var(--accent-d)}
.side-tab-badge.amber{color:var(--amber);background:var(--amber-d)}

.side-scroll{flex:1;overflow-y:auto;padding:0}
.side-scroll::-webkit-scrollbar{width:0}
.side-content{padding:14px 22px 12px}

/* Collapsible sidebar section headers */
.collapsible-header{display:flex;align-items:center;gap:6px;cursor:pointer;transition:color .15s;user-select:none}
.collapsible-header:hover{color:var(--accent)}
.collapsible-chevron{font-size:9px;transition:transform .2s ease;width:14px;display:inline-flex;justify-content:center;color:var(--text4);flex-shrink:0}
.collapsible-chevron.open{transform:rotate(90deg)}
.collapsible-body{overflow:hidden;transition:max-height .25s ease,opacity .2s ease}
.collapsible-body.collapsed{max-height:0 !important;opacity:0;overflow:hidden}

/* Task items */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:8px 12px;margin:0 -12px;border-radius:10px;cursor:pointer;transition:background .15s}
.task-item:hover{background:var(--bg-hover)}
.task-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--accent);flex-shrink:0;margin-top:5px}
.task-item.done .task-dot{background:var(--green);border-color:var(--green)}
.task-content{flex:1;min-width:0}
.task-name{font-size:13px;color:var(--text);font-weight:500;line-height:1.4}
.task-item.done .task-name{text-decoration:line-through;color:var(--text4)}
.task-meta{font-size:11px;color:var(--text4);margin-top:2px;display:flex;align-items:center;gap:6px}
.task-project{color:var(--accent);font-weight:500}
.view-all{font-size:12px;color:var(--text3);cursor:pointer;padding:8px 0;transition:color .15s;font-weight:500}
.view-all:hover{color:var(--accent)}
.empty-state{padding:20px 0;text-align:center;color:var(--text4);font-size:13px;line-height:1.6}
.conv-empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 40px 40px;color:var(--text3);text-align:center}
.conv-empty-icon{color:var(--border);margin-bottom:16px}
.conv-empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}
.conv-empty-hint{font-size:12.5px;color:var(--text4);margin-bottom:16px}
.conv-suggest-list{display:flex;flex-direction:column;gap:6px;width:100%;max-width:420px}
.conv-suggest{padding:9px 16px;background:var(--bg-card);border:1px solid var(--border-lt);border-radius:10px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;text-align:left}
.conv-suggest:hover{background:var(--accent-d);border-color:var(--accent-b);color:var(--text)}

/* Import icon button (compact) */
.import-icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:7px;color:var(--text4);cursor:pointer;transition:all .15s;border:none;background:transparent}
.import-icon-btn:hover{background:var(--bg-hover);color:var(--accent)}

/* Section header with action */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}

/* Triage section (formerly "to sort") */
.triage-section{margin-bottom:16px;border-left:2px solid var(--amber);padding-left:12px;background:rgba(232,180,76,.03);margin-left:-12px;padding-top:4px;padding-bottom:4px;border-radius:0 10px 10px 0}
.sort-section{margin-bottom:16px}
.sort-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sort-badge{font-size:10px;font-weight:600;color:var(--amber);background:var(--amber-d);padding:1px 6px;border-radius:8px}
.sort-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-bottom:6px;border-radius:10px;cursor:pointer;transition:all .2s;border:1px solid var(--border-lt)}
.sort-item:hover{background:var(--bg-hover);border-color:var(--accent-b)}
.sort-item.sorting{background:var(--accent-d);border:1px solid var(--accent-b);margin:4px -12px;padding:0;overflow:hidden}
.sort-item.sorted{opacity:0;transform:translateX(20px);height:0;padding:0;margin:0;overflow:hidden;transition:all .35s ease-out}
.sort-item-name{font-size:13px;color:var(--text);font-weight:500}
.sort-item-date{font-size:11px;color:var(--text4)}
.sort-item-action{font-size:11px;color:var(--accent);font-weight:500;opacity:0;transition:opacity .15s}
.sort-item:hover .sort-item-action{opacity:1}

/* Sort inline panel — AI-driven */
.sort-panel{padding:14px}
.sort-panel-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px}
.sort-thinking{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--accent);font-weight:500;padding:8px 0}
.sort-spin{width:12px;height:12px;border:2px solid var(--accent-b);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
.sort-suggestion{padding:12px;background:var(--bg);border-radius:10px;margin-bottom:12px}
.sort-suggest-dest{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.sort-suggest-dest .folder-icon{font-size:15px;opacity:.6}
.sort-suggest-reason{font-size:12px;color:var(--text3);line-height:1.5}
.sort-actions{display:flex;gap:8px;justify-content:flex-end;align-items:center}
.sort-btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.sort-btn.primary{background:var(--accent);color:#fff}
.sort-btn.primary:hover{background:var(--accent-h)}
.sort-btn.ghost{background:transparent;color:var(--text3)}
.sort-btn.ghost:hover{color:var(--text2)}
.sort-redirect{font-size:11.5px;color:var(--text3);cursor:pointer;transition:color .15s;margin-right:auto}
.sort-redirect:hover{color:var(--accent)}
.sort-filing{display:flex;align-items:center;gap:8px;padding:10px 0;font-size:12.5px;color:var(--accent);font-weight:500}
.sort-success{display:flex;align-items:center;gap:8px;padding:10px 0;color:var(--green);font-size:12.5px;font-weight:500}
.sort-detail{font-size:11px;color:var(--text4);margin-top:4px;line-height:1.5}

/* Redirect folder picker */
.sort-redirect-panel{margin-bottom:12px}
.sort-redirect-label{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:6px}
.sort-folders{display:flex;flex-direction:column;gap:3px}
.sort-folder{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:12.5px;color:var(--text2);font-weight:500;border:1px solid transparent}
.sort-folder:hover{background:var(--bg-hover);color:var(--text)}
.sort-folder.selected{background:var(--accent-d);color:var(--accent);border-color:var(--accent-b)}

/* Sidebar search (sticky) */
.side-search-wrap{padding:14px 22px 0;flex-shrink:0}
.side-search{position:relative}
.side-search-input{width:100%;background:var(--bg-input);border:1px solid var(--border-lt);border-radius:10px;padding:9px 14px 9px 34px;color:var(--text);font-size:12.5px;font-family:inherit;outline:none;transition:all .2s}
.side-search-input:focus{border-color:var(--accent-b);box-shadow:0 0 0 2px rgba(155,138,251,.06)}
.side-search-input::placeholder{color:var(--text4)}
.side-search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text4);display:flex;pointer-events:none}
.side-search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:18px;height:18px;display:none;align-items:center;justify-content:center;border-radius:4px;color:var(--text4);cursor:pointer;border:none;background:transparent;font-size:14px}
.side-search-clear:hover{color:var(--text2);background:var(--bg-hover)}
.side-search-input:not(:placeholder-shown)~.side-search-clear{display:flex}

/* Search results */
.search-results{margin-bottom:14px}
.search-result{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin:0 -12px;border-radius:10px;cursor:pointer;transition:background .15s}
.search-result:hover{background:var(--bg-hover)}
.search-result-left{display:flex;align-items:center;gap:10px;min-width:0}
.search-result-name{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-name mark{background:transparent;color:var(--accent);font-weight:600}
.search-result-path{font-size:11px;color:var(--text4);margin-top:1px}
.search-empty{padding:16px 0;text-align:center;color:var(--text4);font-size:12.5px;line-height:1.5}

/* Pinned files */
.pinned-section{margin-bottom:14px}
.pinned-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.pinned-file{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin:0 -12px;border-radius:10px;cursor:pointer;transition:background .15s}
.pinned-file:hover{background:var(--bg-hover)}
.pinned-file-left{display:flex;align-items:center;gap:10px;min-width:0}
.pinned-file-name{font-size:13px;color:var(--text);font-weight:500}
.pinned-file-date{font-size:11px;color:var(--text4)}
.pin-icon{color:var(--accent);opacity:.5;font-size:11px}

/* Browse all toggle */
.browse-toggle{display:flex;align-items:center;gap:8px;padding:10px 0;font-size:12.5px;font-weight:500;color:var(--text3);cursor:pointer;transition:color .15s;border-top:1px solid var(--border);margin-top:10px}
.browse-toggle:hover{color:var(--accent)}
.browse-toggle-arrow{font-size:9px;transition:transform .15s;width:14px;display:inline-flex;justify-content:center}
.browse-toggle-arrow.open{transform:rotate(90deg)}
.browse-tree{display:none;padding-top:8px}
.browse-tree.open{display:block}
.browse-count{font-size:11px;color:var(--text4);font-weight:400;margin-left:auto}

/* File list in files tab */
.file-section{margin-top:4px}
.file-section-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px}

/* Recent files (All Projects view) */
.recent-file{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin:0 -12px;border-radius:10px;cursor:pointer;transition:background .15s}
.recent-file:hover{background:var(--bg-hover)}
.recent-file-left{display:flex;align-items:center;gap:10px;min-width:0}
.recent-file-icon{color:var(--text4);flex-shrink:0;display:flex}
.recent-file-info{min-width:0}
.recent-file-name{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-file-meta{font-size:11px;color:var(--text4);margin-top:1px;display:flex;align-items:center;gap:6px}
.recent-file-project{color:var(--accent);font-weight:500}
.recent-file-date{color:var(--text4)}

/* Settings icon */
.settings-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text4);cursor:pointer;transition:all .15s;border:none;background:transparent}
.settings-btn:hover{background:var(--bg-hover);color:var(--text2)}

/* Import modal */
.import-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center}
.import-overlay.open{display:flex}
.import-modal{background:var(--bg-card2);border:1px solid var(--border-lt);border-radius:20px;width:560px;max-width:92vw;box-shadow:0 24px 80px rgba(0,0,0,.5);overflow:hidden}
.import-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between}
.import-title{font-size:17px;font-weight:700;color:var(--text)}
.import-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text4);cursor:pointer;transition:all .15s;border:none;background:transparent;font-size:18px}
.import-close:hover{background:var(--bg-hover);color:var(--text2)}

/* Import tabs */
.import-tabs{display:flex;gap:4px;padding:16px 28px 0}
.imp-tab{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s;border:none;background:transparent}
.imp-tab:hover{color:var(--text2);background:var(--bg-hover)}
.imp-tab.active{background:var(--accent-d);color:var(--accent);font-weight:600}

/* Drop zone */
.import-body{padding:20px 28px 28px}
.drop-zone{border:2px dashed var(--border-lt);border-radius:16px;padding:48px 24px;text-align:center;transition:all .2s;cursor:pointer}
.drop-zone:hover{border-color:var(--accent-b);background:var(--accent-d)}
.drop-icon{font-size:36px;margin-bottom:12px;opacity:.5}
.drop-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.drop-hint{font-size:13px;color:var(--text3);line-height:1.5}
.drop-formats{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:16px}
.drop-fmt{font-size:11px;color:var(--text3);background:var(--bg-hover);padding:4px 12px;border-radius:20px}

/* Integrations grid */
.intg-grid{display:flex;flex-direction:column;gap:8px}
.intg-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:all .2s}
.intg-card:hover{border-color:var(--border-lt);background:var(--bg-hover)}
.intg-card.connected{border-color:rgba(109,212,161,.12)}
.intg-icon-wrap{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.intg-icon-wrap.gdrive{background:rgba(66,133,244,.1);color:#4285f4}
.intg-icon-wrap.notion{background:rgba(255,255,255,.06);color:var(--text2)}
.intg-icon-wrap.slack{background:rgba(224,30,90,.08);color:#e01e5a}
.intg-icon-wrap.zoom{background:rgba(45,140,255,.08);color:#2d8cff}
.intg-icon-wrap.hubspot{background:rgba(255,122,69,.08);color:#ff7a45}
.intg-icon-wrap.stripe{background:rgba(99,91,255,.08);color:#635bff}
.intg-info{flex:1;min-width:0}
.intg-name{font-size:14px;font-weight:600;color:var(--text)}
.intg-desc{font-size:12px;color:var(--text3);margin-top:1px}
.intg-status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;flex-shrink:0}
.intg-status.on{color:var(--green)}
.intg-status.off{color:var(--text4)}
.intg-status.soon{color:var(--text4);font-style:italic}
.intg-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.intg-connect-btn{padding:6px 16px;border-radius:8px;background:var(--accent-d);color:var(--accent);border:1px solid var(--accent-b);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.intg-connect-btn:hover{background:var(--accent);color:#fff}

/* (files and inbox items are now rendered inside side-content) */
.files-panel.open{display:block}
.f-row{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;margin:0 -8px;border-radius:8px;cursor:pointer;transition:background .1s}
.f-row:hover{background:var(--bg-hover)}
.f-indent{padding-left:20px}
.f-icon{margin-right:8px;opacity:.5;display:flex;align-items:center}
.f-name{font-size:12.5px;color:var(--text2);font-weight:500}
.f-count{font-size:11px;color:var(--text4)}
.f-date{font-size:11px;color:var(--text4)}
.f-folder{display:flex;align-items:center;gap:4px;cursor:pointer}
.f-folder-arrow{color:var(--text4);font-size:9px;transition:transform .15s;width:14px;display:inline-flex;justify-content:center}
.f-folder-arrow.open{transform:rotate(90deg)}
.f-children{display:none;padding-left:8px}
.f-children.open{display:block}

/* ── Content ── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;transition:margin-left .25s ease}

/* ── Day tabs (horizontal) ── */
.conv-bar{display:flex;align-items:center;padding:0 20px 0 28px;border-bottom:1px solid var(--border);flex-shrink:0;height:46px;gap:12px}
.conv-bar-left{flex:1;min-width:0}
.conv-bar-title{font-size:13.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.conv-bar-title.empty{color:var(--text4);font-weight:400}
.conv-bar-meta{font-size:11px;color:var(--text4);margin-top:1px;display:flex;align-items:center;gap:6px}
.conv-bar-dot{width:3px;height:3px;background:var(--border-lt);border-radius:50%}
.new-conv-btn{display:flex;align-items:center;gap:5px;padding:5px 14px;border-radius:8px;border:1px solid var(--border-lt);background:transparent;color:var(--text3);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;flex-shrink:0;font-family:inherit}
.new-conv-btn:hover{background:var(--bg-hover);color:var(--text2);border-color:var(--border)}

/* ── Thread cards (accordion inside chat) ── */
.thread-card{border:1px solid var(--border-lt);border-radius:14px;overflow:clip;background:var(--bg-card);transition:border-color .2s,box-shadow .2s;flex-shrink:0}
.thread-card:hover{border-color:var(--border-lt)}
.thread-card.expanded{border-color:rgba(155,138,251,.2);box-shadow:0 0 0 1px rgba(155,138,251,.06)}
.thread-card-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s;position:sticky;top:0;z-index:5;background:var(--bg-card);border-radius:14px 14px 0 0}
.thread-card-header:hover{background:var(--bg-hover)}
.thread-card.expanded .thread-card-header{background:var(--bg-card2);border-bottom:1px solid var(--border)}
.thread-card-chevron{font-size:9px;color:var(--text4);transition:transform .2s ease;flex-shrink:0;width:12px;display:inline-flex;justify-content:center}
.thread-card.expanded .thread-card-chevron{transform:rotate(90deg);color:var(--accent)}
.thread-card-title{font-size:13.5px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thread-card-meta{font-size:11.5px;color:var(--text4);display:flex;align-items:center;gap:8px;flex-shrink:0}
.thread-card-saved{color:var(--green);font-weight:500}
.thread-resumed-tag{font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-d);border:1px solid var(--accent-b);padding:2px 10px;border-radius:20px;flex-shrink:0}
.thread-card-body{overflow:hidden;transition:max-height .35s ease,opacity .25s ease;max-height:0;opacity:0;display:flex;flex-direction:column}
.thread-card-body.open{opacity:1;overflow-y:auto}
.thread-card-messages{padding:24px 24px 16px;display:flex;flex-direction:column;gap:20px;flex:1}
.thread-input-wrap{padding:10px 18px 16px;border-top:1px solid var(--border);background:var(--bg-card);position:sticky;bottom:0;flex-shrink:0}
.thread-input-row{display:flex;align-items:center;gap:8px;background:var(--bg-input);border:1px solid var(--border-lt);border-radius:10px;padding:7px 10px 7px 14px;transition:border-color .2s}
.thread-input-row:focus-within{border-color:rgba(155,138,251,.3)}
.thread-input-field{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;resize:none;line-height:1.4;max-height:80px;overflow-y:auto}
.thread-input-field::placeholder{color:var(--text4)}
.thread-send-btn{width:28px;height:28px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;transition:background .15s;opacity:.5}
.thread-send-btn.ready{opacity:1}
.thread-send-btn:hover{background:var(--accent-h)}
.thread-move-today{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:500;color:var(--accent);background:var(--accent-d);border:1px solid var(--accent-b);border-radius:8px;padding:5px 12px;cursor:pointer;transition:all .15s;margin-bottom:8px;width:fit-content}
.thread-move-today:hover{background:var(--accent-b);color:var(--accent-h)}
/* Thread continue footer — replaces inline input */
.thread-continue-footer{display:flex;align-items:center;gap:7px;padding:11px 20px 14px;border-top:1px solid var(--border);font-size:12.5px;color:var(--text4);cursor:pointer;transition:color .2s;user-select:none}
.thread-continue-footer:hover{color:var(--accent)}
.thread-continue-footer svg{flex-shrink:0;transition:transform .2s}
.thread-continue-footer:hover svg{transform:translateX(2px)}
/* Active thread highlight on card */
.thread-card.thread-active{border-color:rgba(155,138,251,.35);box-shadow:0 0 0 1px rgba(155,138,251,.1)}
.thread-card.thread-active .thread-continue-footer{color:var(--accent)}
/* Thread context pill above input */
.thread-ctx{display:none;align-items:center;gap:10px;padding:0 4px 10px}
.thread-ctx-pill{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-d);border:1px solid var(--accent-b);border-radius:20px;padding:4px 10px 4px 10px;flex-shrink:0}
.thread-ctx-name{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.thread-ctx-dismiss{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--text3);cursor:pointer;font-size:13px;line-height:1;margin-left:2px;transition:all .15s;flex-shrink:0}
.thread-ctx-dismiss:hover{color:var(--text);background:rgba(255,255,255,.08)}
.thread-ctx-hint{font-size:11.5px;color:var(--text4)}
.thread-move-today svg{flex-shrink:0}
.thread-resume-btn{font-size:11.5px;font-weight:500;color:var(--text3);background:transparent;border:1px solid var(--border-lt);border-radius:20px;padding:3px 12px;cursor:pointer;transition:all .15s;flex-shrink:0}
.thread-resume-btn:hover{color:var(--accent);border-color:var(--accent-b);background:var(--accent-d)}
.new-conversation-wrap{display:flex;justify-content:center;padding:8px 0 4px;flex-shrink:0}
.new-conversation-btn{display:flex;align-items:center;gap:8px;padding:10px 28px;background:transparent;border:1px dashed var(--border-lt);border-radius:24px;font-size:13px;font-weight:500;color:var(--text4);cursor:pointer;transition:all .2s}
.new-conversation-btn:hover{border-color:var(--accent-b);color:var(--accent);background:var(--accent-d);border-style:solid}
.past-day-hint{text-align:center;padding:16px 0 4px;color:var(--text4);font-size:12px;flex-shrink:0}

/* ── Chat ── */
.chat-area{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:10px}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border-lt);border-radius:2px}

.msg{display:flex;gap:14px;max-width:80%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}

/* Avatars */
.msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.msg-av.ai{background:linear-gradient(135deg,#a594fd,#7b68ee);color:#fff}
.msg-av.u{background:var(--bg-card2);color:var(--text2)}

.msg-body{display:flex;flex-direction:column;gap:6px}
.msg-bubble{padding:16px 22px;border-radius:18px;font-size:14px;line-height:1.7;display:flex;flex-direction:column}
.msg.user .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:6px}
.msg.ai .msg-bubble{background:var(--bg-card);color:var(--text);border-bottom-left-radius:6px}
.msg.ai.briefing .msg-bubble{background:linear-gradient(135deg,rgba(155,138,251,.05),rgba(126,184,240,.03));border:1px solid rgba(155,138,251,.08)}

/* Tags — softer, no borders, rounded */
.msg-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:5px 14px;border-radius:20px;margin-bottom:10px;width:fit-content}
.msg-tag.briefing{background:rgba(232,180,76,.1);color:var(--amber)}
.msg-tag.skill{background:var(--accent-d);color:var(--accent)}
.msg-tag.review{background:var(--green-d);color:var(--green)}

/* Sections in chat — no uppercase */
.sub-label{font-size:12px;font-weight:600;color:var(--text3);margin:14px 0 8px}

/* Chat tasks — cleaner circles */
.chat-task{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:13.5px;color:var(--text2)}
.chat-task.done{color:var(--text4)}
.chat-task.done .ct-text{text-decoration:line-through}
.chat-task-box{width:16px;height:16px;border:2px solid var(--border-lt);border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chat-task-box:hover{border-color:var(--accent)}
.chat-task.done .chat-task-box{background:var(--green);border-color:var(--green)}
.chat-task-project{color:var(--text3);font-weight:500;font-size:12px}

/* Citations — look like links, not code */
.citation{color:var(--accent);font-size:12.5px;font-weight:500;text-decoration:none;cursor:pointer;transition:opacity .15s}
.citation:hover{opacity:.8;text-decoration:underline}

/* Sources — clean pills, no monospace */
.sources{display:flex;align-items:center;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.03);flex-wrap:wrap}
.sources-label{font-size:12px;color:var(--text4)}
.source-pill{font-size:11px;color:var(--text3);background:var(--bg-hover);padding:4px 12px;border-radius:20px;cursor:pointer;transition:all .15s}
.source-pill:hover{color:var(--accent);background:var(--accent-d)}

.saved-indicator{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--green);margin-top:8px;padding:6px 14px;background:var(--green-d);border-radius:20px;font-weight:500}

/* Message actions */
.msg-actions{display:flex;gap:4px;padding:0 6px}
.ma{display:flex;align-items:center;gap:5px;padding:5px 12px;background:transparent;border:none;border-radius:8px;color:var(--text4);font-size:11.5px;font-weight:500;cursor:pointer;transition:all .15s}
.ma:hover{background:var(--bg-hover);color:var(--text2)}
.ma.save:hover{color:var(--accent);background:var(--accent-d)}

/* ── Skills bar ── */
.skills-bar{display:flex;align-items:center;gap:8px;padding:0 0 12px;flex-shrink:0;overflow-x:auto}
.skills-bar::-webkit-scrollbar{height:0}
.sk-label{font-size:12px;font-weight:500;color:var(--text4);margin-right:4px;white-space:nowrap}
.sk{display:flex;align-items:center;gap:6px;padding:8px 18px;background:var(--bg-card);border:none;border-radius:24px;font-size:12.5px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.sk:hover{background:var(--accent-d);color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 16px rgba(155,138,251,.1)}
.sk.run{background:var(--accent-d);color:var(--accent)}
.sk.lock{opacity:.3;cursor:default}
.sk.lock:hover{transform:none;background:var(--bg-card);color:var(--text2);box-shadow:none}
.sk-em{font-size:15px}
.sk-spin{width:10px;height:10px;border:2px solid var(--accent-b);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.sk-price{font-size:9px;color:var(--text4);font-weight:600}
.sk-div{width:1px;height:16px;background:var(--border-lt);flex-shrink:0}
.sk-req{display:flex;align-items:center;gap:5px;padding:8px 16px;background:transparent;border:1px dashed var(--border-lt);border-radius:24px;font-size:12.5px;color:var(--text4);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.sk-req:hover{border-color:var(--accent-b);color:var(--accent);background:var(--accent-d);border-style:solid}

/* Skill animations */
.sk.launching{animation:skLaunch .45s ease-in forwards;pointer-events:none;position:relative;z-index:10}
@keyframes skLaunch{
  0%{transform:scale(1) translateY(0);opacity:1}
  20%{transform:scale(1.08) translateY(0);opacity:1;box-shadow:0 0 24px rgba(155,138,251,.3)}
  50%{transform:scale(.9) translateY(-40px);opacity:.9}
  80%{transform:scale(.7) translateY(-120px);opacity:.5}
  100%{transform:scale(.5) translateY(-200px);opacity:0}
}
.skill-landing{animation:skLand .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes skLand{
  0%{opacity:0;transform:scale(.9) translateY(20px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}

/* ── Chat Input ── */
.chat-input-bar{padding:14px 28px 18px;border-top:1px solid var(--border);flex-shrink:0}
.input-wrap{display:flex;align-items:center;gap:12px;background:var(--bg-card);border:1px solid var(--border-lt);border-radius:14px;padding:12px 18px;transition:all .25s}
.input-wrap:focus-within{border-color:var(--accent-b);box-shadow:0 0 0 3px rgba(155,138,251,.06),0 4px 20px rgba(155,138,251,.08)}
.chat-input{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;font-family:inherit;line-height:1.5;resize:none;outline:none;min-height:20px;max-height:120px;text-align:left}
.chat-input::placeholder{color:var(--text3)}
.send{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#a594fd,#7b68ee);border:none;border-radius:50%;color:#fff;cursor:pointer;flex-shrink:0;transition:all .2s;box-shadow:0 2px 10px rgba(155,138,251,.2)}
.send:hover{transform:scale(1.06);box-shadow:0 4px 18px rgba(155,138,251,.3)}
.ctx-hint{display:flex;align-items:center;gap:7px;margin-top:7px;padding:0 6px}
.ctx-dot{width:6px;height:6px;background:var(--green);border-radius:50%}
.ctx-hint-text{font-size:11.5px;color:var(--text4)}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card2);border:1px solid var(--border-lt);border-radius:20px;padding:30px;width:480px;max-width:90vw;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.modal-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px}
.modal-input{width:100%;background:var(--bg-input);border:1px solid var(--border-lt);border-radius:12px;padding:14px 18px;color:var(--text);font-size:14.5px;font-family:inherit;outline:none;transition:all .2s}
.modal-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(155,138,251,.05)}
.modal-input::placeholder{color:var(--text4)}
.modal-hint{font-size:12px;color:var(--text4);margin-top:10px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
.modal-btn{padding:10px 24px;border-radius:12px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.modal-btn.primary{background:linear-gradient(135deg,#a594fd,#7b68ee);color:#fff;box-shadow:0 2px 10px rgba(155,138,251,.2)}
.modal-btn.primary:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(155,138,251,.3)}
.modal-btn.ghost{background:var(--bg-hover);color:var(--text3);border:none}
.modal-btn.ghost:hover{color:var(--text2)}

/* ── File Preview Panel ── */
.file-preview-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);align-items:flex-start;justify-content:center;padding-top:60px}
.file-preview-overlay.open{display:flex}
.file-preview-panel{background:var(--bg-card2);border:1px solid var(--border-lt);border-radius:18px;width:640px;max-width:90vw;max-height:78vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.5);overflow:hidden}
.fv-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.fv-title-area{display:flex;align-items:center;gap:10px}
.fv-icon{color:var(--text4);display:flex}
.fv-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.fv-meta{font-size:12px;color:var(--text3);margin-top:1px}
.fv-badge{font-size:10px;font-weight:600;color:var(--text4);background:var(--bg-hover);border:1px solid var(--border-lt);padding:3px 10px;border-radius:20px}
.fv-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text4);cursor:pointer;border:none;background:transparent;font-size:18px;transition:all .15s}
.fv-close:hover{background:var(--bg-hover);color:var(--text2)}
.fv-body{flex:1;overflow-y:auto;padding:24px 32px 32px}
.fv-body::-webkit-scrollbar{width:4px}
.fv-body::-webkit-scrollbar-thumb{background:var(--border-lt);border-radius:2px}
/* Rendered markdown styles */
.fv-h1{font-size:22px;font-weight:700;color:var(--text);margin:0 0 18px;letter-spacing:-.3px}
.fv-h2{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.fv-h2:first-child{margin-top:0}
.fv-task{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13.5px;color:var(--text2);cursor:pointer}
.fv-task:hover{color:var(--text)}
.fv-checkbox{width:16px;height:16px;border:2px solid var(--border-lt);border-radius:4px;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.fv-task:hover .fv-checkbox{border-color:var(--accent)}
.fv-task.done .fv-checkbox{background:var(--green);border-color:var(--green)}
.fv-task.done .fv-task-text{text-decoration:line-through;color:var(--text4)}
.fv-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}
.fv-tag.progress{background:rgba(155,138,251,.12);color:var(--accent)}
.fv-tag.due{background:rgba(232,180,76,.1);color:var(--amber)}
.fv-tag.blocked{background:rgba(255,100,100,.1);color:#ff6b6b}
.fv-p{font-size:13.5px;color:var(--text2);line-height:1.7;margin-bottom:10px}
.fv-note{font-size:12px;color:var(--text3);padding:10px 14px;background:var(--bg-hover);border-radius:10px;line-height:1.6;margin-bottom:10px}
.fv-bullet{font-size:13.5px;color:var(--text2);padding:3px 0 3px 16px;position:relative;line-height:1.6}
.fv-bullet::before{content:'\u2022';position:absolute;left:0;color:var(--text4)}
@media(max-width:768px){.sidebar{display:none}.skills-bar{flex-wrap:wrap}}

/* ── Conversations panel ── */
.conv-search-wrap{padding:14px 22px 0;flex-shrink:0}
.conv-search{position:relative}
.conv-search-input{width:100%;background:var(--bg-input);border:1px solid var(--border-lt);border-radius:10px;padding:9px 14px 9px 34px;color:var(--text);font-size:12.5px;font-family:inherit;outline:none;transition:all .2s}
.conv-search-input:focus{border-color:var(--accent-b);box-shadow:0 0 0 2px rgba(155,138,251,.06)}
.conv-search-input::placeholder{color:var(--text4)}
.conv-search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text4);display:flex;pointer-events:none}
.conv-list{display:flex;flex-direction:column;gap:2px}
.conv-card{padding:10px 12px;margin:0 -12px;border-radius:10px;cursor:pointer;transition:background .15s;border:1px solid transparent}
.conv-card:hover{background:var(--bg-hover);border-color:var(--border-lt)}
.conv-card.active{background:var(--accent-d);border-color:var(--accent-b)}
.conv-card-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-card-meta{font-size:11px;color:var(--text4);display:flex;align-items:center;gap:6px;margin-bottom:6px}
.conv-card-project{color:var(--accent);font-weight:500}
.conv-card-summary{font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.conv-tags{display:flex;flex-wrap:wrap;gap:4px}
.conv-tag{font-size:10px;font-weight:500;color:var(--blue);background:rgba(126,184,240,.07);padding:2px 8px;border-radius:20px;border:1px solid rgba(126,184,240,.18)}
.conv-tag.output{color:var(--green);background:var(--green-d);border-color:rgba(109,212,161,.15)}
.conv-tag.skill-tag{color:var(--accent);background:var(--accent-d);border-color:var(--accent-b)}
.conv-section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.conv-empty{padding:20px 0;text-align:center;color:var(--text4);font-size:12.5px;line-height:1.6}
.conv-detail-panel{position:fixed;top:0;right:0;width:480px;height:100%;background:var(--bg-card2);border-left:1px solid var(--border-lt);z-index:40;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-8px 0 32px rgba(0,0,0,.3)}
.conv-detail-panel.open{transform:translateX(0)}
.conv-detail-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:flex-start;gap:12px}
.conv-detail-title{font-size:16px;font-weight:700;color:var(--text);flex:1;letter-spacing:-.2px;line-height:1.3}
.conv-detail-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text4);cursor:pointer;transition:all .15s;border:none;background:transparent;font-size:18px;flex-shrink:0}
.conv-detail-close:hover{background:var(--bg-hover);color:var(--text2)}
.conv-detail-meta{padding:16px 24px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-wrap:wrap;gap:8px}
.conv-detail-pill{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;padding:4px 10px;border-radius:20px;background:var(--bg-hover);color:var(--text3);border:1px solid var(--border-lt)}
.conv-detail-pill.green{color:var(--green);background:var(--green-d);border-color:rgba(109,212,161,.15)}
.conv-detail-pill.accent{color:var(--accent);background:var(--accent-d);border-color:var(--accent-b)}
.conv-detail-body{flex:1;overflow-y:auto;padding:20px 24px}
.conv-detail-body::-webkit-scrollbar{width:4px}
.conv-detail-body::-webkit-scrollbar-thumb{background:var(--border-lt);border-radius:2px}
.conv-detail-section{margin-bottom:20px}
.conv-detail-section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.conv-output-link{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border-lt);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.conv-output-link:hover{border-color:var(--accent-b);background:var(--accent-d)}
.conv-output-link-name{font-size:12.5px;font-weight:500;color:var(--text)}
.conv-output-link-path{font-size:11px;color:var(--text4);margin-top:1px}
.conv-resume-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 0;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:4px}
.conv-resume-btn:hover{background:var(--accent-h);transform:translateY(-1px)}
.conv-detail-summary{font-size:13.5px;color:var(--text2);line-height:1.7}
/* Project picker (new conv empty state) */
.conv-project-picker{display:flex;flex-direction:column;align-items:center;gap:10px;margin:4px 0 20px;width:100%}
.conv-project-picker-label{font-size:12px;color:var(--text4);font-weight:500}
.conv-project-picker-options{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.conv-project-btn{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border-lt);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;font-family:inherit}
.conv-project-btn:hover{border-color:var(--accent-b);color:var(--accent);background:var(--accent-d)}
.conv-project-btn.selected{border-color:var(--accent-b);color:var(--accent);background:var(--accent-d);font-weight:600}

/* Fallback assign banner */
.conv-assign-banner{display:flex;flex-direction:column;gap:10px;padding:14px 18px;background:var(--bg-card);border:1px solid var(--border-lt);border-radius:14px;margin:4px 0 8px}
.conv-assign-banner-text{font-size:12.5px;color:var(--text3)}
.conv-assign-options{display:flex;flex-wrap:wrap;gap:6px}
.conv-assign-opt{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border-lt);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;font-family:inherit}
.conv-assign-opt:hover{border-color:var(--accent-b);color:var(--accent);background:var(--accent-d)}
.conv-assign-dismiss{font-size:11.5px;color:var(--text4);cursor:pointer;margin-top:2px;transition:color .15s}
.conv-assign-dismiss:hover{color:var(--text3)}

/* Move to project in detail panel */
.conv-detail-menu-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:7px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;transition:all .15s}
.conv-detail-menu-btn:hover{background:var(--bg-hover);color:var(--text)}

/* Task add button + form */
.task-add-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:7px;border:1px solid var(--border-lt);background:transparent;color:var(--text4);cursor:pointer;transition:all .15s;flex-shrink:0}
.task-add-btn:hover,.task-add-btn.open{background:var(--accent-d);border-color:var(--accent-b);color:var(--accent)}
.task-add-form{background:var(--bg-card);border:1px solid var(--border-lt);border-radius:12px;padding:12px;margin-bottom:12px;display:flex;flex-direction:column;gap:8px}
.task-add-input{background:var(--bg-input);border:1px solid var(--border-lt);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;width:100%}
.task-add-input:focus{border-color:var(--accent-b)}
.task-add-input::placeholder{color:var(--text4)}
.task-add-date{background:var(--bg-input);border:1px solid var(--border-lt);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .2s;width:100%}
.task-add-date:focus{border-color:var(--accent-b)}
.task-add-date::placeholder{color:var(--text4)}
.task-add-actions{display:flex;gap:8px;justify-content:flex-end}

/* Detail panel tag editing */
.conv-detail-tag-x{margin-left:5px;opacity:.5;font-size:9px;cursor:pointer;transition:opacity .15s}
.conv-detail-tag-x:hover{opacity:1}
.conv-detail-tag-add{margin-top:8px}
.conv-detail-tag-input{background:transparent;border:none;border-bottom:1px solid var(--border-lt);color:var(--text);font-size:12px;font-family:inherit;outline:none;padding:3px 0;width:70px;min-width:70px;transition:border-color .15s}
.conv-detail-tag-input:focus{border-color:var(--accent)}
.conv-detail-tag-input::placeholder{color:var(--text4)}

/* Source link in file preview */
.fv-source{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--accent-d);border:1px solid var(--accent-b);border-radius:10px;margin-bottom:18px;cursor:pointer;transition:all .15s}
.fv-source:hover{background:var(--accent-b)}
.fv-source-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.fv-source-title{font-size:12.5px;font-weight:600;color:var(--accent)}

/* ── Conversations new button + ellipsis menu ── */
.conv-new-btn{display:flex;align-items:center;gap:6px;width:100%;padding:8px 12px;background:transparent;border:1px dashed var(--border-lt);border-radius:10px;color:var(--text4);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;margin-bottom:14px}
.conv-new-btn:hover{background:var(--accent-d);border-color:var(--accent-b);color:var(--accent)}
.conv-card{position:relative}
.conv-card-menu-btn{position:absolute;top:8px;right:6px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:transparent;border:none;color:var(--text4);cursor:pointer;opacity:0;transition:opacity .15s,background .15s;font-size:16px;line-height:1;padding:0}
.conv-card:hover .conv-card-menu-btn{opacity:1}
.conv-card-menu-btn:hover{background:var(--bg-card);color:var(--text2)}
.conv-card-menu-btn.open{opacity:1;background:var(--bg-card);color:var(--text2)}
.conv-ctx-menu{position:fixed;background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:100;min-width:160px;padding:4px;animation:menuIn .1s ease}
@keyframes menuIn{from{opacity:0;transform:scale(.96) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.conv-ctx-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:7px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .1s;white-space:nowrap}
.conv-ctx-item:hover{background:var(--bg-hover);color:var(--text)}
.conv-ctx-item.danger{color:#f87171}
.conv-ctx-item.danger:hover{background:rgba(248,113,113,.08)}
.conv-ctx-sep{height:1px;background:var(--border);margin:4px 0}

/* conversations search area */
.conv-header-wrap{padding:12px 22px 0;display:flex;flex-direction:column;gap:8px}
.conv-search-row{display:flex;align-items:center;gap:6px}
.conv-search-row .conv-search{flex:1;position:relative}
.conv-tag-dropdown-btn{display:inline-flex;align-items:center;align-self:flex-start;gap:5px;padding:5px 11px;background:transparent;border:1px solid var(--border-lt);border-radius:20px;color:var(--text4);cursor:pointer;font-family:inherit;font-size:11.5px;transition:all .15s;white-space:nowrap}
.conv-tag-dropdown-btn:hover,.conv-tag-dropdown-btn.open{background:var(--bg-hover);color:var(--text3);border-color:var(--border)}
.conv-tag-dropdown-btn.active{color:var(--text4);background:transparent;border-color:var(--border-lt)}
.conv-tag-dropdown{position:fixed;background:var(--bg-card2);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:200;min-width:200px;max-width:260px;padding:6px;animation:menuIn .12s ease;max-height:320px;overflow-y:auto}
.conv-tag-dropdown::-webkit-scrollbar{width:4px}
.conv-tag-dropdown::-webkit-scrollbar-thumb{background:var(--border-lt);border-radius:2px}
.conv-tag-dropdown-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:13px;color:var(--text3);cursor:pointer;transition:background .1s}
.conv-tag-dropdown-item:hover{background:var(--bg-hover);color:var(--text)}
.conv-tag-dropdown-item.active{color:var(--accent);background:var(--accent-d)}
.conv-tag-dropdown-sep{height:1px;background:var(--border);margin:4px 0}
.conv-tag{cursor:pointer;transition:background .15s,border-color .15s}
.conv-tag:hover{background:var(--bg-card);border-color:var(--border)}
.conv-tag.active-filter{color:var(--accent);background:var(--accent-d);border-color:var(--accent-b)}

/* ── Sidebar detail overlay (v11) ── */
.sidebar-detail-view{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg-side);z-index:10;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .25s ease;overflow:hidden}
.sidebar-detail-view.open{transform:translateX(0)}
.sidebar-detail-top{padding:16px 22px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-detail-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sidebar-back-btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:none;color:var(--text4);cursor:pointer;font-size:12px;font-weight:500;padding:0;font-family:inherit;transition:color .15s}
.sidebar-back-btn:hover{color:var(--accent)}
.sidebar-nav-arrows{display:flex;align-items:center;gap:2px}
.sidebar-nav-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:7px;background:transparent;border:1px solid var(--border-lt);color:var(--text4);cursor:pointer;transition:all .15s;flex-shrink:0}
.sidebar-nav-btn:hover:not(:disabled){background:var(--bg-hover);color:var(--text2);border-color:var(--border)}
.sidebar-nav-btn:disabled{opacity:.25;cursor:default}
.sidebar-detail-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.35;letter-spacing:-.2px}
.sidebar-detail-meta{font-size:11px;color:var(--text4);margin-top:5px;display:flex;align-items:center;gap:5px}
.sidebar-detail-scroll{flex:1;overflow-y:auto;padding:18px 22px 24px}
.sidebar-detail-scroll::-webkit-scrollbar{width:0}
.sidebar-detail-section{margin-bottom:20px}
.sidebar-detail-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sidebar-output-link{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg-card);border:1px solid var(--border-lt);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.sidebar-output-link:hover{border-color:var(--green);background:var(--green-d)}
.sidebar-output-name{font-size:12.5px;font-weight:500;color:var(--text)}
.sidebar-output-path{font-size:11px;color:var(--text4);margin-top:1px}
.sidebar-open-conv-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px 0;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;margin-top:4px}
.sidebar-open-conv-btn:hover{background:var(--accent-h)}

/* ── Right file view panel (v11) ── */
.file-view-panel{position:fixed;top:0;right:0;width:560px;height:100%;background:var(--bg-card2);border-left:1px solid var(--border-lt);z-index:40;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-12px 0 40px rgba(0,0,0,.35)}
.file-view-panel.open{transform:translateX(0)}
.file-view-resize-handle{position:absolute;top:0;left:-4px;width:8px;height:100%;cursor:col-resize;z-index:5;background:transparent;transition:background .15s}
.file-view-resize-handle:hover,.file-view-resize-handle.dragging{background:var(--accent-b)}
.file-view-header{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 24px 14px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.file-view-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px;font-family:'SF Mono',ui-monospace,monospace}
.file-view-path{font-size:11px;color:var(--text4);margin-top:3px;font-family:'SF Mono',ui-monospace,monospace;opacity:.7}
.file-view-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text4);cursor:pointer;border:none;background:transparent;font-size:18px;transition:all .15s;flex-shrink:0;margin-top:-2px}
.file-view-close:hover{background:var(--bg-hover);color:var(--text2)}
.file-view-body{flex:1;overflow-y:auto;padding:28px 40px 48px}
.file-view-body::-webkit-scrollbar{width:4px}
.file-view-body::-webkit-scrollbar-thumb{background:var(--border-lt);border-radius:2px}
.file-view-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text4);font-size:13px;gap:10px}

/* ── Markdown renderer ── */
.md-h1{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.4px;margin:0 0 20px;line-height:1.3}
.md-h2{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin:32px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.md-h2:first-child{margin-top:0}
.md-h3{font-size:15px;font-weight:600;color:var(--text);margin:22px 0 8px;letter-spacing:-.1px}
.md-h4{font-size:11px;font-weight:700;color:var(--text3);margin:18px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.md-p{font-size:14px;color:var(--text2);line-height:1.8;margin:0 0 12px}
.md-code{font-family:'SF Mono',ui-monospace,monospace;font-size:12px;background:rgba(155,138,251,.1);color:var(--accent);padding:2px 7px;border-radius:5px;letter-spacing:-.2px}
.md-pre{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin:14px 0;overflow-x:auto}
.md-codeblock{font-family:'SF Mono',ui-monospace,monospace;font-size:12.5px;color:var(--text2);white-space:pre;display:block;line-height:1.65}
.md-blockquote{border-left:3px solid var(--accent-b);background:var(--accent-d);padding:12px 18px;border-radius:0 10px 10px 0;margin:14px 0;color:var(--text2);font-style:italic;line-height:1.7;font-size:13.5px}
.md-ul{padding-left:0;margin:8px 0 14px;list-style:none}
.md-ol{padding-left:22px;margin:8px 0 14px}
.md-ul .md-li{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:6px;padding-left:0}
.md-ul .md-li::before{content:'·';color:var(--text4);font-size:18px;line-height:1.3;flex-shrink:0}
.md-ol .md-li{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:6px}
.md-tasklist .md-li::before{display:none}
.md-task{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;font-size:14px;color:var(--text2);line-height:1.6}
.md-checkbox{width:16px;height:16px;border:1.5px solid var(--border-lt);border-radius:4px;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;background:transparent}
.md-checkbox-done{background:var(--green);border-color:var(--green)}
.md-task-done .md-task-text{text-decoration:line-through;color:var(--text4)}
.md-hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.md-link{color:var(--accent);font-weight:500;cursor:pointer;text-decoration:none}
.md-link:hover{text-decoration:underline}
.md-spacer{height:6px}
.md-strong{color:var(--text);font-weight:600}
.md-em{font-style:italic}
</style>
</head>

<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </div>

      <div class="bell" onclick="alert('1. Meeting Parser finished\n2. Weekly Review update available\n3. Your requested skill is in development')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <div class="bell-dot"></div>

// ── Markdown renderer ──
function renderMarkdown(md) {
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  const CHK_ICON = '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>';

  function inline(s) {
    s = esc(s);
    s = s.replace(/`([^`]+)`/g, '<code class="md-code">$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong class="md-strong">$1</strong>');
    s = s.replace(/\*([^*\n]+)\*/g, '<em class="md-em">$1</em>');
    s = s.replace(/~~([^~]+)~~/g, '<del>$1</del>');
    s = s.replace(/\[([^\]]+)\]\([^)]*\)/g, '<span class="md-link">$1</span>');
    return s;
  }

  const lines = md.trim().split('\n');
  let out = '', i = 0, inCode = false, codeLines = [], inUl = false, inOl = false;

  function closeList() {
    if (inUl) { out += '</ul>'; inUl = false; }
    if (inOl) { out += '</ol>'; inOl = false; }
  }

  while (i < lines.length) {
    const line = lines[i];

    // Fenced code block
    if (line.startsWith('```')) {
      if (!inCode) { closeList(); inCode = true; codeLines = []; }
      else { inCode = false; out += `<pre class="md-pre"><code class="md-codeblock">${esc(codeLines.join('\n'))}</code></pre>`; }
      i++; continue;
    }
    if (inCode) { codeLines.push(line); i++; continue; }

    // Headings
    if (line.startsWith('#### ')) { closeList(); out += `<h4 class="md-h4">${inline(line.slice(5))}</h4>`; i++; continue; }
    if (line.startsWith('### '))  { closeList(); out += `<h3 class="md-h3">${inline(line.slice(4))}</h3>`; i++; continue; }
    if (line.startsWith('## '))   { closeList(); out += `<h2 class="md-h2">${inline(line.slice(3))}</h2>`; i++; continue; }
    if (line.startsWith('# '))    { closeList(); out += `<h1 class="md-h1">${inline(line.slice(2))}</h1>`; i++; continue; }

    // HR
    if (/^---+$/.test(line.trim())) { closeList(); out += '<hr class="md-hr">'; i++; continue; }

    // Blockquote
    if (line.startsWith('> ')) { closeList(); out += `<blockquote class="md-blockquote">${inline(line.slice(2))}</blockquote>`; i++; continue; }

    // Italic-only lines (e.g. *text*)
    const italicLine = line.match(/^\*([^*]+)\*$/);
    if (italicLine) { closeList(); out += `<p class="md-p"><em class="md-em">${esc(italicLine[1])}</em></p>`; i++; continue; }

    // Checkboxes
    const checkDone = line.match(/^[-*] \[x\] (.+)/i);
    const checkOpen = line.match(/^[-*] \[ \] (.+)/);
    if (checkDone) {
      if (!inUl) { out += '<ul class="md-ul md-tasklist">'; inUl = true; }
      out += `<li class="md-task md-task-done"><span class="md-checkbox md-checkbox-done">${CHK_ICON}</span><span class="md-task-text">${inline(checkDone[1])}</span></li>`;
      i++; continue;
    }
    if (checkOpen) {
      if (!inUl) { out += '<ul class="md-ul md-tasklist">'; inUl = true; }
      out += `<li class="md-task"><span class="md-checkbox"></span><span class="md-task-text">${inline(checkOpen[1])}</span></li>`;
      i++; continue;
    }

    // Unordered list
    const ulMatch = line.match(/^[-*] (.+)/);
    if (ulMatch) {
      if (inOl) { out += '</ol>'; inOl = false; }
      if (!inUl) { out += '<ul class="md-ul">'; inUl = true; }
      out += `<li class="md-li">${inline(ulMatch[1])}</li>`;
      i++; continue;
    }

    // Ordered list
    const olMatch = line.match(/^\d+\. (.+)/);
    if (olMatch) {
      if (inUl) { out += '</ul>'; inUl = false; }
      if (!inOl) { out += '<ol class="md-ol">'; inOl = true; }
      out += `<li class="md-li">${inline(olMatch[1])}</li>`;
      i++; continue;
    }

    // Empty line
    if (line.trim() === '') { closeList(); out += '<div class="md-spacer"></div>'; i++; continue; }

    // Paragraph
    closeList();
    out += `<p class="md-p">${inline(line)}</p>`;
    i++;
  }
  closeList();
  return out;
}

function toggleCollapsible(id) {
  const body = document.getElementById('coll-body-' + id);
  const chevron = document.getElementById('coll-chev-' + id);
  if (!body || !chevron) return;
  const isCollapsed = body.classList.contains('collapsed');
  if (isCollapsed) {
    body.classList.remove('collapsed');
    body.style.maxHeight = body.scrollHeight + 'px';
    chevron.classList.add('open');
  } else {
    body.style.maxHeight = body.scrollHeight + 'px';
    requestAnimationFrame(() => {
      body.classList.add('collapsed');
      body.style.maxHeight = '0px';
      chevron.classList.remove('open');
    });
  }
}

function renderFileTree(files, indent, projName) {
  let h = '';
  for (const f of files) {
    const cls = indent ? ' f-indent' : '';
    if (f.type === 'folder') {
      const id = 'f_' + Math.random().toString(36).substr(2,6);
      const isOpen = !!f.open;
      h += `<div class="f-row${cls}"><div class="f-folder" onclick="document.getElementById('${id}').classList.toggle('open');this.querySelector('.f-folder-arrow').classList.toggle('open')"><span class="f-folder-arrow${isOpen?' open':''}">&#9654;</span><span class="f-icon">${ICON_FOLDER}</span><span class="f-name">${f.name}</span></div><span class="f-count">${f.count||''}</span></div>`;
      if (f.children) h += `<div class="f-children${isOpen?' open':''}" id="${id}">${renderFileTree(f.children, true, projName)}</div>`;
    } else {
      const hasPreview = !!FILE_CONTENT[f.name];
      const clickHandler = hasPreview ? `onclick="openFilePreview('${f.name.replace(/'/g,"\\'")}','${(projName||'').replace(/'/g,"\\'")}');event.stopPropagation()"` : '';
      const fileStyle = hasPreview ? 'cursor:pointer' : '';
      const hoverClass = hasPreview ? ' class="f-row' + cls + '"' : '';
      h += `<div class="f-row${cls}" style="${fileStyle}" ${clickHandler}><span style="display:flex;align-items:center"><span class="f-icon">${ICON_FILE}</span><span class="f-name"${hasPreview?` style="color:var(--text)"`:''}>${f.name}</span></span><span class="f-date">${f.date||''}</span></div>`;
    }
  }
  return h;
}

        <button class="conv-project-btn" id="ppbtn-vault" onclick="selectNewConvProject('vault')">Keep in All Projects</button>
      </div>
    </div>` : '';

  const suggests = d.tasks.length
    ? `<div class="conv-suggest-list">
        ${d.tasks.slice(0,3).map(t => `<div class="conv-suggest" onclick="injectSuggest(this,'${t.name.replace(/'/g,"\\'")}')">${t.name}</div>`).join('')}
      </div>`
    : '';

  document.getElementById('chat').innerHTML = `<div class="conv-empty-state">
    <div class="conv-empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
    <div class="conv-empty-title">Ask anything about ${d.name === 'All Projects' ? 'your projects' : d.name}</div>
    ${projectPicker}
    <div class="conv-empty-hint">Or pick up from an open task:</div>
    ${suggests}
  </div>`;

  document.querySelectorAll('.conv-card').forEach(el => el.classList.remove('active'));
  document.getElementById('chatInput').placeholder = d.placeholder;
  document.getElementById('chatInput').focus();
}

function selectNewConvProject(key) {
  pendingProjectKey = key;
  document.querySelectorAll('.conv-project-btn').forEach(b => b.classList.remove('selected'));
  const btn = document.getElementById('ppbtn-' + key);
  if (btn) btn.classList.add('selected');
  const label = key === 'vault' ? 'All Projects' : D[key].name;
  document.getElementById('chatInput').placeholder = `Ask anything about ${label}\u2026`;
  document.getElementById('chatInput').focus();
}

function injectSuggest(el, text) {
  document.getElementById('chatInput').value = text;
  document.getElementById('chatInput').focus();
  document.getElementById('chat').innerHTML = '';
}

const PLUS_ICON = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';

function renderThreadCard(t, cardId, startOpen, isResumed, resumedFrom, isToday) {
  const msgCount = t.chat ? t.chat.length : 0;
  const savedCount = t.saved || 0;
  const metaParts = [];
  if (msgCount) metaParts.push(`${msgCount} message${msgCount !== 1 ? 's' : ''}`);
  if (savedCount) metaParts.push(`<span class="thread-card-saved">${savedCount} saved</span>`);

  let headerExtras = '';
  if (isResumed) headerExtras += `<span class="thread-resumed-tag">Resumed from ${resumedFrom}</span>`;
  if (!isToday && !isResumed) headerExtras += `<button class="thread-resume-btn" onclick="event.stopPropagation();resumeThread('${t.id}')">Resume in Today \u2192</button>`;

  const bodyStyle = startOpen ? `max-height:520px;opacity:1` : `max-height:0;opacity:0`;
  const isPast = !isToday && !isResumed;

  const footerLabel = isPast
    ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="17 11 12 6 7 11"/><line x1="12" y1="18" x2="12" y2="6"/></svg> Continue this thread \u2014 moves to Today`
    : `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Continue this thread\u2026`;

  const continueFooter = `<div class="thread-continue-footer" onclick="activateThread('${cardId}','${t.threadName}','${t.id}',${isPast})">${footerLabel}</div>`;

  return `<div class="thread-card${startOpen ? ' expanded' : ''}${startOpen ? ' thread-active' : ''}" id="tc-${cardId}" data-thread-name="${t.threadName}" data-thread-id="${t.id}" data-is-past="${isPast}">
    <div class="thread-card-header" onclick="toggleThreadCard('${cardId}')">
      <span class="thread-card-chevron">&#9654;</span>
      <span class="thread-card-title">${t.threadName}</span>
      ${headerExtras}
      <span class="thread-card-meta">${metaParts.join(' &middot; ')}</span>
    </div>
    <div class="thread-card-body${startOpen ? ' open' : ''}" id="tc-body-${cardId}" style="${bodyStyle}">
      <div class="thread-card-messages" id="tc-msgs-${cardId}">${t.chat ? t.chat.map(renderMsg).join('') : ''}</div>
      ${continueFooter}
    </div>
  </div>`;
}

function buildDayChat(d, dayKey) {
  const groups = groupThreadsByDay(d.threads);
  const group = groups.find(g => g.day === dayKey || (dayKey === 'Today' && g.isToday));
  if (!group) return '';
  const isToday = group.isToday;

  let html = '';

  // Resumed threads shown first under Today (auto-expanded)
  if (isToday && resumedThreads.length) {
    for (let i = 0; i < resumedThreads.length; i++) {
      const rt = resumedThreads[i];
      html += renderThreadCard(rt, `resumed-${rt.id}`, true, true, rt.day, true);
    }
  }

  // Single thread on this day → auto-open. Multiple → all collapsed.
  const autoOpen = group.threads.length === 1 && resumedThreads.length === 0;
  for (let i = 0; i < group.threads.length; i++) {
    const t = group.threads[i];
    html += renderThreadCard(t, `day-${t.id}`, autoOpen, false, null, isToday);
  }

  if (isToday) {
    html += `<div class="new-conversation-wrap"><div class="new-conversation-btn" onclick="newConversation()">${PLUS_ICON} New conversation</div></div>`;
  } else {
    html += `<div class="past-day-hint">Resume a thread to move it into Today&#39;s chat.</div>`;
  }

  return html;
}

function closeThreadCard(otherId) {
  const c = document.getElementById('tc-' + otherId);
  const b = document.getElementById('tc-body-' + otherId);
  if (!c || !b) return;
  c.classList.remove('expanded', 'thread-active');
  b.classList.remove('open');
  b.style.maxHeight = '0';
  b.style.overflowY = 'hidden';
  b.style.opacity = '0';
}

function toggleThreadCard(cardId) {
  const card = document.getElementById('tc-' + cardId);
  const body = document.getElementById('tc-body-' + cardId);
  if (!card || !body) return;
  const isOpen = card.classList.contains('expanded');

  // Close all other open threads (accordion)
  document.querySelectorAll('.thread-card.expanded').forEach(c => {
    const otherId = c.id.slice(3); // strip leading 'tc-'
    if (otherId !== cardId) closeThreadCard(otherId);
  });

  if (isOpen) {
    card.classList.remove('expanded');
    body.classList.remove('open');
    body.style.maxHeight = '0';
    body.style.overflowY = 'hidden';
    body.style.opacity = '0';
    if (activeThread && activeThread.cardId === cardId) deactivateThread();
  } else {
    card.classList.add('expanded');
    body.classList.add('open');
    body.style.maxHeight = '520px';
    body.style.overflowY = 'auto';
    body.style.opacity = '1';
    const threadName = card.dataset.threadName;
    const threadId = card.dataset.threadId;
    const isPast = card.dataset.isPast === 'true';
    activateThread(cardId, threadName, threadId, isPast);
  }
}

function switchDay(dayKey) {
  currentDay = dayKey;
  const d = D[currentMode];
  document.getElementById('dayTabs').innerHTML = renderDayTabs(d, dayKey);
  document.getElementById('chat').innerHTML = buildDayChat(d, dayKey);
  // Update saved count from first thread of that day
  const groups = groupThreadsByDay(d.threads);
  const group = groups.find(g => g.day === dayKey || (dayKey === 'Today' && g.isToday));
  const saved = group ? group.threads.reduce((s, t) => s + (t.saved || 0), 0) : 0;
  document.getElementById('savedNum').textContent = saved;
  document.querySelector('.chat-area').scrollTop = 0;
}

// ── Thread activation — locks bottom bar to a thread ──
let activeThread = null;

function activateThread(cardId, threadName, threadId, isPast) {
  // Deactivate any previously active thread
  if (activeThread && activeThread.cardId !== cardId) {
    const prev = document.getElementById('tc-' + activeThread.cardId);
    if (prev) prev.classList.remove('thread-active');
  }
  activeThread = { cardId, threadId, threadName, isPast };

  // Lock bottom bar to this thread
  const input = document.getElementById('chatInput');
  input.placeholder = `Continue: ${threadName}\u2026`;
  input.focus();

  // Show context pill
  const ctx = document.getElementById('threadCtx');
  ctx.style.display = 'flex';
  document.getElementById('threadCtxName').textContent = threadName;
  const hint = document.getElementById('threadCtxHint');
  hint.textContent = isPast ? 'Will move to Today on send' : '';
  hint.style.display = isPast ? '' : 'none';

  // Mark card active
  const card = document.getElementById('tc-' + cardId);
  if (card) card.classList.add('thread-active');
}

function deactivateThread() {
  if (activeThread) {
    const card = document.getElementById('tc-' + activeThread.cardId);
    if (card) card.classList.remove('thread-active');
  }
  activeThread = null;
  const d = D[currentMode];
  document.getElementById('chatInput').placeholder = d ? d.placeholder : '';
  document.getElementById('threadCtx').style.display = 'none';
}

function onMainKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onMainSend(); }
}

function onMainSend() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const chat = document.getElementById('chat');
  const isFirstMsg = newConvIsFirstMsg;
  const assignedKey = pendingProjectKey;
  newConvIsFirstMsg = false;

  if (chat.querySelector('.conv-empty-state')) chat.innerHTML = '';

  chat.insertAdjacentHTML('beforeend', renderMsg({type:'user', body: text}));
  document.querySelector('.chat-area').scrollTop = document.querySelector('.chat-area').scrollHeight;

  setTimeout(() => {
    const d = D[currentMode];
    const contextName = assignedKey && assignedKey !== 'vault' ? D[assignedKey].name : d.name;
    chat.insertAdjacentHTML('beforeend', renderMsg({type:'ai', body:`Got it. Based on your ${contextName} context, I\u2019ll work on that now\u2026<br><br><span style="color:var(--text3)">[This is a prototype \u2014 real responses will draw from your vault files.]</span>`}));
    document.querySelector('.chat-area').scrollTop = document.querySelector('.chat-area').scrollHeight;

    // Option 2 — fallback banner if first msg in All Projects with no project selected
    if (isFirstMsg && currentMode === 'vault' && !assignedKey) {
      const banner = document.createElement('div');
      banner.className = 'conv-assign-banner';
      banner.id = 'assignBanner';
      banner.innerHTML = `<div class="conv-assign-banner-text">Assign this conversation to a project?</div>
        <div class="conv-assign-options">
          ${Object.keys(D).filter(k => k !== 'vault').map(k =>
            `<button class="conv-assign-opt" onclick="assignAndDismissBanner('${k}')">${D[k].name}</button>`
          ).join('')}
        </div>
        <span class="conv-assign-dismiss" onclick="dismissAssignBanner()">Keep in All Projects</span>`;
      chat.appendChild(banner);
      document.querySelector('.chat-area').scrollTop = document.querySelector('.chat-area').scrollHeight;
    }
  }, 700);
}

function resumeThread(threadId) {
  const d = D[currentMode];
  const groups = groupThreadsByDay(d.threads);
  for (const group of groups) {
    const t = group.threads.find(t => t.id === threadId);
    if (t) {
      if (!resumedThreads.find(r => r.id === threadId)) {
        resumedThreads.unshift({ ...t, day: group.day });
      }
      switchDay('Today');
      return;
    }
  }
}

const ICON_FILE = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
const ICON_FOLDER = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
const ICON_IMPORT = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';

function countAllFiles(files) {
  let c = 0;
  for (const f of files) {
    if (f.type === 'folder') c += (f.count || 0);
    else c++;
  }
  return c;
}

        html += `<div class="task-item"><div class="task-dot"></div><div class="task-content"><div class="task-name">${t.name}</div><div class="task-meta">${proj}Due ${t.date}</div></div></div>`;

      html += `<div class="empty-state">${taskSearchQuery ? 'No tasks match your search.' : 'No open tasks right now.'}</div>`;
