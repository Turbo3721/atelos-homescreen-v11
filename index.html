    html += '</div>';

    // Unsorted section
    if (filteredInbox.length) {
      html += `<div class="triage-section" id="sortSection" style="margin-top:12px">`;
      html += `<div class="collapsible-header sort-label" onclick="toggleCollapsible('triage')" style="margin-bottom:10px"><span class="collapsible-chevron open" id="coll-chev-triage">&#9654;</span> Unsorted <span class="sort-badge">${filteredInbox.length}</span></div>`;
      html += `<div class="collapsible-body" id="coll-body-triage" style="max-height:500px">`;
      filteredInbox.forEach((item, idx) => {
        html += `<div class="sort-item" id="sort-${idx}" onclick="openSort(${idx},'${item.title.replace(/'/g,"\\'")}','${item.date}')"><div><div class="sort-item-name">${item.title}</div><div class="sort-item-date">${item.date}</div></div><span class="sort-item-action">Sort \u2192</span></div>`;
      });
      html += '</div></div>';
    }
  } else if (tab === 'conversations') {
    const ICON_TAG = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>';
    const ICON_CHEVRON = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>';
    const tagBtnActive = '';

    document.getElementById('sideSearchWrap').style.display = '';
    document.getElementById('sideSearchWrap').innerHTML = `<div style="display:flex;flex-direction:column;gap:6px">
      <div class="side-search">
        <span class="side-search-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input class="side-search-input" id="convSearchInput" placeholder="Search conversations\u2026" oninput="filterConversations(this.value)" value="${convSearchQuery}">
        <button class="side-search-clear" onclick="clearConvSearch()">&times;</button>
      </div>
      <div id="convActiveFilters"></div>
      <button class="conv-tag-dropdown-btn" id="convTagBtn" onclick="toggleTagDropdown(event)" title="Filter by tag">
        ${ICON_TAG} Tags ${ICON_CHEVRON}
      </button>
    </div>`;
    refreshFilterChips();

    const rawConvs = d.conversations || [];
    let convs = applyConvFiltersAndSort(rawConvs);

    if (!convs.length) {
      html += `<div class="empty-state">${activeTagFilters.size ? 'No conversations match the selected tags.<br><span onclick="filterByTag(null)" style="color:var(--accent);cursor:pointer">Clear filters</span>' : 'No conversations yet.<br>Start a new session to begin building your history.'}</div>`;
    } else {
      const today = convs.filter(c => c.date === 'Apr 9' || c.date === 'Today');
      const earlier = convs.filter(c => c.date !== 'Apr 9' && c.date !== 'Today');
      if (today.length) { html += `<div class="conv-section-label">Today</div>`; for (const c of today) html += renderConvCard(c); }
      if (earlier.length) { html += `<div class="conv-section-label" style="margin-top:${today.length?'12px':'0'}">Earlier</div>`; for (const c of earlier) html += renderConvCard(c); }
    }
  }

  html += '</div>';
  document.getElementById('sideScroll').innerHTML = html;
}

function renderConvCard(c) {
  const ICON_MSG = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
  const ICON_OUT = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
  const ICON_SK = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>';

  let tags = '';
  for (const t of c.tags.slice(0,3)) {
    const isActive = activeTagFilters.has(t);
    tags += `<span class="conv-tag${isActive?' active-filter':''}" onclick="event.stopPropagation();filterByTag('${t.replace(/'/g,"\\'")}')" title="Filter by: ${t}">${t}</span>`;
  }
  for (const s of (c.skills||[]).slice(0,2)) {
    const isActive = activeTagFilters.has(s);
    tags += `<span class="conv-tag skill-tag${isActive?' active-filter':''}" onclick="event.stopPropagation();filterByTag('${s.replace(/'/g,"\\'")}')" title="Filter by: ${s}">${ICON_SK} ${s}</span>`;
  }
  if (c.outputs && c.outputs.length) tags += `<span class="conv-tag output">${ICON_OUT} ${c.outputs.length} output${c.outputs.length>1?'s':''}</span>`;

  return `<div class="conv-card" data-conv-id="${c.id}" onclick="onConvCardClick('${c.id}')">
    <button class="conv-card-menu-btn" id="cmb-${c.id}" onclick="event.stopPropagation();showConvMenu(event,'${c.id}')" title="More options">&#8942;</button>
    <div class="conv-card-title" style="padding-right:22px">${c.title}</div>
    <div class="conv-card-meta">
      <span>${c.date}</span>
      <span style="color:var(--border-lt)">·</span>
      ${ICON_MSG}<span>${c.messages} messages</span>
      ${c.project && c.project !== 'All Projects' ? `<span style="color:var(--border-lt)">·</span><span class="conv-card-project">${c.project}</span>` : ''}
    </div>
    <div class="conv-card-summary">${c.summary}</div>
    <div class="conv-tags">${tags}</div>
  </div>`;
}

// ── Conversation filter state ──
let activeTagFilters = new Set();
let convSearchQuery = '';

function getAllConvTags(d) {
  const seen = new Set();
  const tags = [];
  for (const c of d.conversations || []) {
    for (const t of c.tags || []) { if (!seen.has(t)) { seen.add(t); tags.push(t); } }
    for (const s of c.skills || []) { if (!seen.has(s)) { seen.add(s); tags.push(s); } }
  }
  return tags;
}

function applyConvFiltersAndSort(convs) {
  let result = convs;
  if (convSearchQuery) {
    const q = convSearchQuery.toLowerCase();
    result = result.filter(c =>
      c.title.toLowerCase().includes(q) ||
      c.summary.toLowerCase().includes(q) ||
      c.tags.some(t => t.toLowerCase().includes(q)) ||
      (c.skills||[]).some(s => s.toLowerCase().includes(q))
    );
  }
  if (activeTagFilters.size) {
    result = result.filter(c =>
      [...activeTagFilters].some(t => c.tags.includes(t) || (c.skills||[]).includes(t))
    );
  }
  return result; // data is already newest-first
}

function filterConversations(query) {
  convSearchQuery = query;
  renderSideTab('conversations', D[currentMode]);
}

let taskSearchQuery = '';

function handleTaskSearch(query) {
  taskSearchQuery = query;
  renderSideTab('tasks', D[currentMode]);
}

function clearTaskSearch() {
  taskSearchQuery = '';
  const input = document.getElementById('taskSearchInput');
  if (input) input.value = '';
  renderSideTab('tasks', D[currentMode]);
}

function toggleAddTask() {
  const form = document.getElementById('taskAddForm');
  const btn = document.getElementById('taskAddBtn');
  if (!form) return;
  const isOpen = form.style.display !== 'none';
  form.style.display = isOpen ? 'none' : 'flex';
  btn && btn.classList.toggle('open', !isOpen);
  if (!isOpen) document.getElementById('taskAddName').focus();
}

function onTaskAddKey(e) {
  if (e.key === 'Enter') submitAddTask();
  if (e.key === 'Escape') toggleAddTask();
}

function submitAddTask() {
  const name = (document.getElementById('taskAddName').value || '').trim();
  if (!name) { document.getElementById('taskAddName').focus(); return; }
  const date = (document.getElementById('taskAddDate').value || '').trim() || 'No date';
  const d = D[currentMode];
  d.tasks.unshift({ name, date });
  taskSearchQuery = '';
  renderSideTab('tasks', d);
}

function clearConvSearch() {
  convSearchQuery = '';
  const input = document.getElementById('convSearchInput');
  if (input) input.value = '';
  reRenderConvList();
}

function filterByTag(tag) {
  // tag === null means clear all
  if (tag === null) {
    activeTagFilters.clear();
  } else {
    if (activeTagFilters.has(tag)) activeTagFilters.delete(tag);
    else activeTagFilters.add(tag);
  }
  refreshTagDropdown();
  refreshTagBtn();
  refreshFilterChips();
  reRenderConvList();
}

function refreshFilterChips() {
  const el = document.getElementById('convActiveFilters');
  if (!el) return;
  if (activeTagFilters.size === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:4px">${[...activeTagFilters].map(t =>
    `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--accent);background:var(--accent-d);border:1px solid var(--accent-b);padding:3px 8px 3px 10px;border-radius:20px;cursor:pointer" onclick="filterByTag('${t.replace(/'/g,"\\'")}')">${t}<span style="opacity:.6;font-size:10px;line-height:1;margin-left:2px">✕</span></span>`
  ).join('')}</div>`;
}

function refreshTagDropdown() {
  const dropdown = document.getElementById('convTagDropdown');
  if (!dropdown) return;
  const ICON_CHECK = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
  const ICON_BLANK = '<span style="width:11px;display:inline-block"></span>';
  const d = D[currentMode];
  const allTags = getAllConvTags(d);
  const noneActive = activeTagFilters.size === 0;
  let inner = `<div class="conv-tag-dropdown-item${noneActive?' active':''}" onclick="filterByTag(null)">${noneActive?ICON_CHECK:ICON_BLANK} All conversations</div>`;
  if (allTags.length) {
    inner += `<div class="conv-tag-dropdown-sep"></div>`;
    for (const t of allTags) {
      const isActive = activeTagFilters.has(t);
      inner += `<div class="conv-tag-dropdown-item${isActive?' active':''}" onclick="filterByTag('${t.replace(/'/g,"\\'")}')">${isActive?ICON_CHECK:ICON_BLANK} ${t}</div>`;
    }
  }
  dropdown.innerHTML = inner;
}

function refreshTagBtn() {
  const btn = document.getElementById('convTagBtn');
  if (!btn) return;
  const ICON_TAG = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>';
  const ICON_CHEVRON = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>';
  btn.innerHTML = `${ICON_TAG} Tags ${ICON_CHEVRON}`;
  btn.className = `conv-tag-dropdown-btn`;
}

function reRenderConvList() {
  const d = D[currentMode];
  const convs = applyConvFiltersAndSort(d.conversations || []);
  const content = document.querySelector('#sideScroll .side-content');
  if (!content) return;
  const today = convs.filter(c => c.date === 'Apr 9' || c.date === 'Today');
  const earlier = convs.filter(c => c.date !== 'Apr 9' && c.date !== 'Today');
  let html = '';
  if (!convs.length) {
    html = `<div class="empty-state">${activeTagFilters.size ? 'No conversations match the selected tags.<br><span onclick="filterByTag(null)" style="color:var(--accent);cursor:pointer">Clear filters</span>' : 'No conversations yet.'}</div>`;
  } else {
    if (today.length) { html += `<div class="conv-section-label">Today</div>`; for (const c of today) html += renderConvCard(c); }
    if (earlier.length) { html += `<div class="conv-section-label" style="margin-top:${today.length?'12px':'0'}">Earlier</div>`; for (const c of earlier) html += renderConvCard(c); }
  }
  content.innerHTML = html;
}

// ── Tag dropdown ──
function toggleTagDropdown(event) {
  event.stopPropagation();
  const existing = document.getElementById('convTagDropdown');
  if (existing) { hideTagDropdown(); return; }

  const btn = document.getElementById('convTagBtn');
  if (btn) btn.classList.add('open');

  const d = D[currentMode];
  const allTags = getAllConvTags(d);
  const ICON_CHECK = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
  const ICON_BLANK = '<span style="width:11px;display:inline-block"></span>';

  const dropdown = document.createElement('div');
  dropdown.className = 'conv-tag-dropdown';
  dropdown.id = 'convTagDropdown';
  document.body.appendChild(dropdown);
  refreshTagDropdown(); // populate using shared helper

  const btnRect = btn ? btn.getBoundingClientRect() : {bottom:120, left:22};
  dropdown.style.top = (btnRect.bottom + 4) + 'px';
  dropdown.style.left = btnRect.left + 'px';

  setTimeout(() => document.addEventListener('click', hideTagDropdown, {once:true}), 0);
}

function hideTagDropdown() {
  const d = document.getElementById('convTagDropdown');
  if (d) d.remove();
  const btn = document.getElementById('convTagBtn');
  if (btn) btn.classList.remove('open');
}

// ── V11: Sidebar detail view (left panel) ──
function showConvDetailInSidebar(convId) {

  const c = result.conv;

  const ICON_MSG = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';

  const allCards = Array.from(document.querySelectorAll('.conv-card'));
  const currentIdx = allCards.findIndex(el => el.dataset.convId === convId);

    skillsHtml = `<div class="sidebar-detail-section">
      <div class="sidebar-detail-label">Skills used</div>

    for (const s of c.skills) {
      skillsHtml += `<span class="conv-tag skill-tag">${ICON_SK} ${s}</span>`;

  // Tags section (editable)
  let tagsHtml = `<div class="sidebar-detail-section">
    <div class="sidebar-detail-label">Tags</div>
    <div class="conv-tags" style="gap:6px;align-items:center;flex-wrap:wrap" id="detailTagList">`;
  for (const t of (c.tags||[])) {
    tagsHtml += `<span class="conv-tag" style="cursor:default">${t}<span class="conv-detail-tag-x" onclick="removeConvTag('${c.id}','${t.replace(/'/g,"\\'")}')">✕</span></span>`;

// Single click → show detail after delay; double click → open conversation directly
let _convClickTimer = null;
function onConvCardClick(convId) {
  if (_convClickTimer) {
    // Second click within 280ms — treat as double-click
    clearTimeout(_convClickTimer);
    _convClickTimer = null;
    closeSidebarDetail();
    loadConv(convId);
  } else {
    _convClickTimer = setTimeout(() => {
      _convClickTimer = null;
      showConvDetailInSidebar(convId);
    }, 280);
  }
}

function closeSidebarDetail() {
  document.getElementById('sidebarDetailView').classList.remove('open');
  document.querySelectorAll('.conv-card').forEach(el => el.classList.remove('active'));
}

// Click-away: close sidebar detail when clicking outside it.
// stopPropagation on #sidebarDetailView (set in HTML) means clicks inside
// the panel never reach this listener — so anything that does reach it is outside.
document.addEventListener('click', function(e) {
  const detail = document.getElementById('sidebarDetailView');
  if (!detail || !detail.classList.contains('open')) return;
  if (e.target.closest('.conv-card')) return; // clicking a card switches detail, not closes it
  closeSidebarDetail();
});

// ── V11: Right file view panel ──
function openFileView(name, path) {
  const entry = FILE_CONTENT[name];
  document.getElementById('fileViewTitle').textContent = name;
  document.getElementById('fileViewPath').textContent = path ? path.replace(/→|>/g, '›') : '';

  if (entry && entry.md) {
    document.getElementById('fileViewBody').innerHTML = renderMarkdown(entry.md);
  } else if (entry && entry.render) {
    document.getElementById('fileViewBody').innerHTML = entry.render();
  } else {
    document.getElementById('fileViewBody').innerHTML = `<div class="file-view-empty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>No preview available for this file</span>
    </div>`;
  }
  document.getElementById('fileViewPanel').classList.add('open');
  document.getElementById('fileViewBody').scrollTop = 0;
}

function closeFileView() {
  document.getElementById('fileViewPanel').classList.remove('open');
}

function onDetailTagKey(e, convId) {
  if (e.key !== 'Enter') return;
  const input = document.getElementById('detailTagInput');
  const tag = input.value.trim();
  if (!tag) return;
  const result = findConvById(convId);
  if (!result) return;
  if (!result.conv.tags.includes(tag)) {
    result.conv.tags.push(tag);
    reRenderConvList();
    refreshFilterChips();
  }
  // Re-render just the tag list in the panel
  const list = document.getElementById('detailTagList');
  if (list) {
    list.innerHTML = result.conv.tags.map(t =>
      `<span class="conv-tag" style="cursor:default">${t}<span class="conv-detail-tag-x" onclick="removeConvTag('${convId}','${t.replace(/'/g,"\\'")}')">✕</span></span>`
    ).join('');
  }
  input.value = '';
  input.style.width = '70px';
  input.focus();
}

function removeConvTag(convId, tag) {
  const result = findConvById(convId);
  if (!result) return;
  result.conv.tags = result.conv.tags.filter(t => t !== tag);
  if (activeTagFilters.has(tag)) {
    activeTagFilters.delete(tag);
    refreshTagBtn();

function getAllFileNames(d) {
  const results = [];
  function walk(files, path) {
    for (const f of files) {
      if (f.type === 'folder') {
        results.push({ name: f.name, path: path, type: 'folder', date: '' });
        if (f.children) walk(f.children, path ? path + ' / ' + f.name : f.name);
      } else {
        results.push({ name: f.name, path: path, type: 'file', date: f.date || '' });
      }
    }
  }
  walk(d.files, '');
  // Also add recent files not in tree
  if (d.recentFiles) {
    for (const f of d.recentFiles) {
      if (!results.find(r => r.name === f.name)) {
        results.push({ name: f.name, path: f.path || f.project || '', type: 'file', date: f.date });
      }
    }
  }
  return results;
}

function handleSideSearch(query) {
  const d = D[currentMode];
  const resultsEl = document.getElementById('searchResults');
  const mainEls = ['pinnedSection', 'recentSection', 'browseSection'].map(id => document.getElementById(id)).filter(Boolean);

  if (!query.trim()) {
    resultsEl.style.display = 'none';
    mainEls.forEach(el => el.style.display = '');
    return;
  }

  mainEls.forEach(el => el.style.display = 'none');
  resultsEl.style.display = 'block';

  const allFiles = getAllFileNames(d);
  const q = query.toLowerCase();
  const matches = allFiles.filter(f => f.name.toLowerCase().includes(q));

  if (!matches.length) {
    resultsEl.innerHTML = '<div class="search-empty">No files matching "' + query + '"</div>';
    return;
  }

  let html = '';
  for (const m of matches) {
    const highlighted = m.name.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>');
    const icon = m.type === 'folder' ? ICON_FOLDER : ICON_FILE;
    html += `<div class="search-result"><div class="search-result-left"><span class="recent-file-icon">${icon}</span><div><div class="search-result-name">${highlighted}</div>${m.path ? `<div class="search-result-path">${m.path}</div>` : ''}</div></div><span class="pinned-file-date">${m.date}</span></div>`;
  }
  resultsEl.innerHTML = html;
}

function clearSideSearch() {
  const input = document.getElementById('sideSearchInput');
  if (input) { input.value = ''; handleSideSearch(''); input.focus(); }
}

(function initSidebarResize() {
  const handle = document.getElementById('sideResizeHandle');
  const sidebar = document.getElementById('sidebar');
  if (!handle || !sidebar) return;
  let startX, startWidth;

  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    startX = e.clientX;
    startWidth = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    function onMove(e) {
      const newWidth = Math.min(Math.max(startWidth + (e.clientX - startX), 180), 440);
      sidebar.style.flexBasis = newWidth + 'px';
      // Remove transition while dragging for snappiness
      sidebar.style.transition = 'none';
    }
    function onUp() {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      sidebar.style.transition = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

function renameConv(convId) {
  hideConvMenu();
  const result = findConvById(convId);
  if (!result) return;
  const { conv } = result;
  const newName = prompt('Rename conversation:', conv.title);
  if (newName && newName.trim() && newName.trim() !== conv.title) {
    conv.title = newName.trim();
    // Re-render the Chats sidebar to reflect the new name
    renderSideTab('conversations', D[currentMode]);
    // Update conv bar if this is the active conversation
    if (activeConvId === convId) {
      document.getElementById('convBarTitle').textContent = conv.title;
    }
    // Update sidebar detail panel title if open
    const detailPanel = document.getElementById('sidebarDetailView');
    if (detailPanel && detailPanel.classList.contains('open')) {
      const titleEl = detailPanel.querySelector('.sidebar-detail-title');
      if (titleEl) titleEl.textContent = conv.title;
    }
  }
}

function deleteConv(convId) {
  hideConvMenu();
  const result = findConvById(convId);
  if (!result) return;
  const { conv, projectKey } = result;
  if (!confirm(`Delete "${conv.title}"?\n\nThis only removes it from the list — the underlying files stay in your vault.`)) return;
  D[projectKey].conversations = D[projectKey].conversations.filter(c => c.id !== convId);
  closeSidebarDetail();
  // If active, start new
  if (activeConvId === convId) newConversation();
  renderSideTab('conversations', D[currentMode]);
  // Update badge
  document.getElementById('sideTabs').innerHTML = buildSideTabs(D[currentMode]);
  // Re-activate conversations tab
  document.querySelectorAll('.side-tab')[2].classList.add('active');
}

go('vault');
</script>
</body>
</html>
